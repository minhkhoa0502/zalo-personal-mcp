# Egress allowlist proxy for zalo-personal-mcp.
#
# This is the SECURITY boundary of the sandbox: the zalo-mcp container has no
# route to the internet except through this proxy, and this proxy only permits
# connections to Zalo-owned domains. A compromised dependency therefore has
# nowhere to exfiltrate to. Host set derived from docs/audit/zca-js-2.1.2.md.

# --- Allowlist -------------------------------------------------------------
# Leading dot = domain and all subdomains.
#   .zalo.me     API + websocket hosts
#   .zaloapp.com misc Zalo services
#   .zadn.vn     Zalo/VNG CDN (from the audit)
#   .zdn.vn      Zalo photo/file CDN (e.g. zpc.zdn.vn) — used for media download
acl zalo dstdomain .zalo.me .zadn.vn .zaloapp.com .zdn.vn

# Only allow TLS (443). Zalo Web is HTTPS-only.
acl SSL_ports port 443
acl CONNECT method CONNECT

# --- Access rules (first match wins) --------------------------------------
# Deny CONNECT tunnels to anything but 443.
http_access deny CONNECT !SSL_ports
# Allow (any method) to Zalo domains only.
http_access allow zalo
# Everything else is denied — including all non-Zalo hosts and DNS exfil.
http_access deny all

# --- Listener --------------------------------------------------------------
http_port 3128

# We allowlist by domain and have no peers, so ICMP RTT probing is useless — and
# containers can't open ICMP sockets anyway (noisy "pinger ... Network
# unreachable" / "Unable to open ICMP sockets" logs). Turn it off.
pinger_enable off

# Do not cache anything (sessions/messages are sensitive).
cache deny all

# Squid drops privileges to the 'proxy' user, which cannot open /dev/stdout,
# so log to the image's default proxy-writable directory. Inspect denials with:
#   docker compose exec egress-proxy tail -f /var/log/squid/access.log
access_log stdio:/var/log/squid/access.log squid
logfile_rotate 0

# Tidy shutdown.
shutdown_lifetime 5 seconds
